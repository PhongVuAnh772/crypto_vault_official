apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-quote
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.quote.replicas }}
  selector:
    matchLabels: { app: dex-quote }
  template:
    metadata:
      labels: { app: dex-quote }
    spec:
      containers:
        - name: quote
          image: {{ .Values.quote.image }}
          ports: [{ containerPort: {{ .Values.quote.port }} }]
---
