apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: dex-gateway
  template:
    metadata:
      labels:
        app: dex-gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: dex-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: dex-gateway
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.gateway.port }}

